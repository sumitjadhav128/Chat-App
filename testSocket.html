<!DOCTYPE html>
<html>
<head>
<title>Chat UI Test</title>
<span id="notificationDot" style="color:red;display:none;">● New Message</span>
<p>conversation Id: 69aec37b771c6249207fe8f4</p>
<p>UserA : 69ae654f407212bde009c9ac</p>
<p>UserB : 69aec2cc771c6249207fe8f2</p>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

#chatContainer{
width:400px;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.message{
margin:5px 0;
padding:8px;
border-radius:6px;
max-width:70%;
}

.me{
background:#dcf8c6;
margin-left:auto;
text-align:right;
}

.other{
background:#eee;
}

#typingStatus{
font-size:12px;
color:gray;
height:15px;
}

</style>

</head>

<body>

<div id="chatContainer">

<h3>Chat Test</h3>

<label>User ID</label>
<input id="userId" placeholder="User ID">

<br><br>

<label>Conversation ID</label>
<input id="conversationId">

<br><br>

<button onclick="connectUser()">Connect</button>
<button onclick="joinConversation()">Join Chat</button>

<h4>Online Users</h4>
<ul id="onlineUsers"></ul>

<hr>

<div id="messages"></div>

<p id="typingStatus"></p>

<input id="messageInput" placeholder="Type message">

<input type="file" id="fileInput">

<button onclick="sendMessage()">Send</button>

</div>

<script>

const socket = io("http://localhost:5000");

function connectUser(){

const userId = document.getElementById("userId").value;

socket.emit("add-user", userId);

console.log("Connected as:", userId);

}

function joinConversation(){

const conversationId =
document.getElementById("conversationId").value;

socket.emit("join-conversation", conversationId);

console.log("Joined conversation:", conversationId);

// load previous chat
loadMessages(conversationId);

}

async function sendMessage(){

const conversationId =
document.getElementById("conversationId").value;

const senderId =
document.getElementById("userId").value;

const text =
document.getElementById("messageInput").value;

const file =
document.getElementById("fileInput").files[0];

let attachments = [];

if(file){

const formData = new FormData();

formData.append("file", file);

const res = await fetch(
"http://localhost:5000/api/upload",
{
method:"POST",
body:formData
});

const data = await res.json();

attachments.push(data.fileUrl);

}

socket.emit("send-message",{
conversationId,
senderId,
text,
attachments
});

document.getElementById("messageInput").value="";
document.getElementById("fileInput").value="";

}

// listening for online user
socket.on("get-users",(users)=>{

const list = document.getElementById("onlineUsers");

list.innerHTML = "";

users.forEach(user => {

const li = document.createElement("li");

li.innerText = user.userId + " 🟢";

list.appendChild(li);

});

});

// load msg
async function loadMessages(conversationId){

try{

const res = await fetch(
"http://localhost:5000/api/messages/" + conversationId
);

const messages = await res.json();

document.getElementById("messages").innerHTML="";

messages.forEach(msg => {

addMessage(msg.text, msg.senderId, msg.attachments || []);

});

}catch(error){

console.log("Error loading messages", error);

}

}

// add msg
function addMessage(text, senderId, attachments=[]){

const currentUserId =
document.getElementById("userId").value;

const messageDiv = document.createElement("div");

messageDiv.classList.add("message");

if(senderId === currentUserId){

messageDiv.classList.add("me");

}else{

messageDiv.classList.add("other");

}

if(text){
messageDiv.innerHTML = "<p>"+text+"</p>";
}

attachments.forEach(file=>{

const img = document.createElement("img");

img.src = file;
img.style.width="150px";
img.style.display="block";
img.style.marginTop="5px";

const link = document.createElement("a");

link.href = file;
link.target = "_blank";

link.appendChild(img);

messageDiv.appendChild(link);

});

document.getElementById("messages").appendChild(messageDiv);

document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight;

}




socket.on("receive-message",(data)=>{

addMessage(data.text, data.senderId, data.attachments || []);

const currentUserId =
document.getElementById("userId").value;

// show notification if message from other user
if(data.senderId !== currentUserId){

document.getElementById("notificationDot").style.display="block";

}

});

const messageInput =
document.getElementById("messageInput");

messageInput.addEventListener("input",()=>{

const conversationId =
document.getElementById("conversationId").value;

const senderId =
document.getElementById("userId").value;

socket.emit("typing",{
conversationId,
senderId
});

setTimeout(()=>{

socket.emit("stop-typing",{
conversationId,
senderId
});

},1000);

});

socket.on("typing",(senderId)=>{

document.getElementById("typingStatus").innerText =
senderId + " is typing...";

});

socket.on("stop-typing",()=>{

document.getElementById("typingStatus").innerText = "";

});

</script>

</body>
</html>
