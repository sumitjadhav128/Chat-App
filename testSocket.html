<!DOCTYPE html>
<html>
<head>
<title>Socket Test</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body>

<h2>Socket Test Page</h2>

<label>Conversation ID:</label>
<input id="conversationId">

<label>User ID:</label>
<input id="userId" placeholder="Enter your user ID">

<br><br>

<br><br>

<label>Message:</label>
<input id="message" placeholder="Enter message">

<p id="typingStatus"></p>

<br><br>

<button onclick="connectUser()">Connect</button>
<button onclick="sendMessage()">Send Message</button>
<button onclick="joinConversation()">Join Conversation</button>

<script>

const socket = io("http://localhost:5000");

function joinConversation(){

const conversationId =
document.getElementById("conversationId").value;

socket.emit("join-conversation", conversationId);

console.log("Joined conversation:", conversationId);

}

function connectUser(){

const userId = document.getElementById("userId").value;

socket.emit("add-user", userId);

console.log("Connected as:", userId);

}

function sendMessage(){

const conversationId =
document.getElementById("conversationId").value;

const senderId =
document.getElementById("userId").value;

const text =
document.getElementById("message").value;

socket.emit("send-message",{
conversationId,
senderId,
text
});

}


//tying status
const messageInput = document.getElementById("message");

messageInput.addEventListener("input", () => {

const conversationId =
document.getElementById("conversationId").value;

const senderId =
document.getElementById("userId").value;

socket.emit("typing", {
conversationId,
senderId
});

setTimeout(() => {

socket.emit("stop-typing", {
conversationId,
senderId
});

}, 1000);

});

socket.on("typing",(senderId)=>{

document.getElementById("typingStatus").innerText =
senderId + " is typing...";

});

socket.on("stop-typing",()=>{

document.getElementById("typingStatus").innerText = "";

});


// receive
socket.on("receive-message",(data)=>{

const currentUserId =
document.getElementById("userId").value;

// if sender is NOT the current user → show alert
if(data.senderId !== currentUserId){

alert("Message from " + data.senderId + ": " + data.text);

}

console.log("Message received:",data);

});

</script>

</body>
</html>
