<!DOCTYPE html>
<html>
<head>
<title>Chat UI Test</title>
<span id="notificationDot" style="color:red;display:none;">● New Message</span>
<p>conversation Id: 69aec37b771c6249207fe8f4</p>
<p>UserA : 69ae654f407212bde009c9ac</p>
<p>UserB : 69aec2cc771c6249207fe8f2</p>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

#chatContainer{
width:400px;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#messages{
height:300px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

.message{
margin:5px 0;
padding:8px;
border-radius:6px;
max-width:70%;
}

.me{
background:#dcf8c6;
margin-left:auto;
text-align:right;
}

.other{
background:#eee;
}

#typingStatus{
font-size:12px;
color:gray;
height:15px;
}

.message .reaction-buttons{
display:none;
}

.message:hover .reaction-buttons{
display:block;
}

</style>

</head>

<body>

<div id="chatContainer">

<h3>Chat Test</h3>

<label>User ID</label>
<input id="userId" placeholder="User ID">

<br><br>

<label>Conversation ID</label>
<input id="conversationId">

<br><br>

<button onclick="connectUser()">Connect</button>
<button onclick="joinConversation()">Join Chat</button>

<h4>Online Users</h4>
<ul id="onlineUsers"></ul>

<hr>

<div id="messages"></div>

<p id="typingStatus"></p>

<input id="messageInput" placeholder="Type message">

<input type="file" id="fileInput">

<button onclick="sendMessage()">Send</button>
<button onclick="editLastMessage()">Edit Last</button>
<button onclick="deleteLastMessage()">Delete Last</button>

</div>

<script>

const socket = io("http://localhost:5000");

function connectUser(){

const userId = document.getElementById("userId").value;

socket.emit("add-user", userId);

console.log("Connected as:", userId);

}

// window loading
window.onload = () => {
    joinConversation();
};


function editLastMessage(){
console.log("Edit button clicked");
const messages =
document.querySelectorAll(".message");

const last = messages[messages.length-1];

const messageId = last.getAttribute("data-id");

socket.emit("edit-message",{
messageId,
newText:"Edited message"
});

}

function deleteLastMessage(){

const messages =
document.querySelectorAll(".message");

const last = messages[messages.length-1];

const messageId = last.getAttribute("data-id");

socket.emit("delete-message",{messageId});

}

// start edit
function startEdit(messageId){

const msg = document.querySelector(
`[data-id="${messageId}"]`
);

if(!msg) return;

const textEl = msg.querySelector(".message-text");

const currentText = textEl.innerText;

const newText = prompt("Edit message:", currentText);

if(!newText) return;

socket.emit("edit-message",{
messageId,
newText,
senderId:
document.getElementById("userId").value,
conversationId:
document.getElementById("conversationId").value
});

}

// join chat
function joinConversation(){

const conversationId =
document.getElementById("conversationId").value;

socket.emit("join-conversation", conversationId);

console.log("Joined conversation:", conversationId);

// load previous chat
loadMessages(conversationId);

}


async function sendMessage(){

const conversationId =
document.getElementById("conversationId").value;

const senderId =
document.getElementById("userId").value;

const text =
document.getElementById("messageInput").value;

const file =
document.getElementById("fileInput").files[0];

let attachments = [];

if(file){

const formData = new FormData();

formData.append("file", file);

const res = await fetch(
"http://localhost:5000/api/upload",
{
method:"POST",
body:formData
});

const data = await res.json();

attachments.push(data.fileUrl);

}

socket.emit("send-message",{
conversationId,
senderId,
text,
attachments
});

document.getElementById("messageInput").value="";
document.getElementById("fileInput").value="";

}

// listening for online user
socket.on("get-users",(users)=>{

const list = document.getElementById("onlineUsers");

list.innerHTML = "";

users.forEach(user => {

const li = document.createElement("li");

li.innerText = user.userId + " 🟢";

list.appendChild(li);

});

});

// auto join on page loads
window.onload = () => {
    const conversationId = document.getElementById("conversationId").value;
    if(conversationId) {
        socket.emit("join-conversation", conversationId);
        console.log("Auto joined conversation:", conversationId);
    }
};

// load msg
async function loadMessages(conversationId){

try{

const res = await fetch(
"http://localhost:5000/api/messages/" + conversationId
);

const messages = await res.json();

document.getElementById("messages").innerHTML="";

messages.forEach(msg=>{

addMessage(
msg._id,
msg.text,
msg.senderId,
msg.attachments || []
);

});

}catch(error){

console.log("Error loading messages", error);

}

}

// add msg
function addMessage(messageId, text, senderId, attachments = []) {
    const currentUserId = document.getElementById("userId").value;

    const messageDiv = document.createElement("div");
    messageDiv.classList.add("message");
    messageDiv.setAttribute("data-id", messageId);

    // sender styling
    messageDiv.classList.add(senderId === currentUserId ? "me" : "other");

    // message text
    const textEl = document.createElement("p");
    textEl.classList.add("message-text");
    textEl.innerText = text || "";
    messageDiv.appendChild(textEl);

    // attachments
    attachments.forEach(file => {
        const img = document.createElement("img");
        img.src = file;
        img.style.width = "150px";
        img.style.display = "block";
        img.style.marginTop = "5px";
        img.style.cursor = "pointer";

        const link = document.createElement("a");
        link.href = file;
        link.target = "_blank";
        link.appendChild(img);
        messageDiv.appendChild(link);
    });

    // reaction display container (must be added for EVERY message)
    const reactionDisplay = document.createElement("div");
    reactionDisplay.classList.add("reactions");
    messageDiv.appendChild(reactionDisplay);

    // reaction buttons
    const reactionContainer = document.createElement("div");
    reactionContainer.classList.add("reaction-buttons");
    ["👍","❤️","😂"].forEach(emoji => {
        const btn = document.createElement("button");
        btn.innerText = emoji;
        btn.onclick = () => {
            socket.emit("add-reaction",{
                messageId,
                userId: currentUserId,
                emoji,
                conversationId: document.getElementById("conversationId").value
            });
        };
        reactionContainer.appendChild(btn);
    });
    messageDiv.appendChild(reactionContainer);

    // edit & delete only for sender
    if(senderId === currentUserId){
        const editBtn = document.createElement("button");
        editBtn.innerText = "Edit";
        editBtn.style.marginRight = "5px";
        editBtn.onclick = () => startEdit(messageId);

        const deleteBtn = document.createElement("button");
        deleteBtn.innerText = "Delete";
        deleteBtn.onclick = () => {
            socket.emit("delete-message",{
                messageId,
                senderId: currentUserId,
                conversationId: document.getElementById("conversationId").value
            });
        };

        messageDiv.appendChild(editBtn);
        messageDiv.appendChild(deleteBtn);
    }

    document.getElementById("messages").appendChild(messageDiv);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
}
// receive message
socket.on("receive-message",(data)=>{

addMessage(
data._id,
data.text,
data.senderId,
data.attachments || []
);

const currentUserId =
document.getElementById("userId").value;

if(data.senderId !== currentUserId){
document.getElementById("notificationDot").style.display="block";
}

});

const messageInput =
document.getElementById("messageInput");

messageInput.addEventListener("input",()=>{

const conversationId =
document.getElementById("conversationId").value;

const senderId =
document.getElementById("userId").value;

socket.emit("typing",{
conversationId,
senderId
});

setTimeout(()=>{

socket.emit("stop-typing",{
conversationId,
senderId
});

},1000);

});

// reaction-update
socket.on("reaction-updated", (data) => {
    const msg = document.querySelector(`[data-id="${data.messageId}"]`);
    if(!msg) return;

    const reactionDiv = msg.querySelector(".reactions");
    if(!reactionDiv) return;

    reactionDiv.innerHTML = "";

    const currentUserId = document.getElementById("userId").value;

    // Group reactions by emoji
    const reactionMap = {};
    data.reactions.forEach(r => {
        if(!reactionMap[r.emoji]) reactionMap[r.emoji] = [];
        reactionMap[r.emoji].push(r.userId);
    });

    Object.keys(reactionMap).forEach(emoji => {
        const users = reactionMap[emoji];
        const span = document.createElement("span");

        span.innerText = emoji + " " + users.length;
        span.style.marginRight = "8px";

        if(users.includes(currentUserId)){
            span.style.background = "#d1f7c4";
            span.style.borderRadius = "5px";
            span.style.padding = "2px 6px";
        }

        reactionDiv.appendChild(span);
    });
});

// listen for edit event
socket.on("message-edited",(data)=>{

const msg = document.querySelector(
`[data-id="${data.messageId}"]`
);

if(msg){

const textEl = msg.querySelector(".message-text");

if(textEl){

textEl.innerText = data.newText + " (edited)";

}

}

});

//listen for delete event
socket.on("message-deleted",(data)=>{

const msg = document.querySelector(
`[data-id="${data.messageId}"]`
);

if(msg){

msg.innerHTML = "<i>This message was deleted</i>";

}

});

//typing
socket.on("typing",(senderId)=>{

document.getElementById("typingStatus").innerText =
senderId + " is typing...";

});

socket.on("stop-typing",()=>{

document.getElementById("typingStatus").innerText = "";

});

// start edit

</script>

</body>
</html>
